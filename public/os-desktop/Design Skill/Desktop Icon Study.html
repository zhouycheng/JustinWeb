<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Desktop Icon Study</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: #fdfbf2;
        color: #222536;
        font-family: "SFMono-Regular", Menlo, Monaco, monospace;
      }

      main {
        padding: 42px;
      }

      h1 {
        margin: 0 0 22px;
        font-size: clamp(30px, 5vw, 52px);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
        gap: 18px;
      }

      .tile {
        padding: 24px;
        min-height: 150px;
        border: 2px solid #d7e6ff;
        background: white;
      }

      .sample {
        width: 74px;
        height: 74px;
        border-radius: 18px;
        margin-bottom: 18px;
        background: #ffe468;
        box-shadow: 0 10px 18px rgba(0, 47, 167, 0.12);
      }

      p {
        margin: 0;
        color: #626779;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Desktop Icon Study</h1>
      <section class="grid" aria-label="icon rules">
        <div class="tile">
          <div class="sample" aria-hidden="true"></div>
          <p>Soft square, visible label, tactile shadow.</p>
        </div>
        <div class="tile">
          <div class="sample" style="background:#ffffff;border:4px solid #b7dbff" aria-hidden="true"></div>
          <p>Files carry the extension as a readable badge.</p>
        </div>
        <div class="tile">
          <div class="sample" style="background:#fff5e6;border:4px solid #ffbd8a" aria-hidden="true"></div>
          <p>Personal apps can break the system just enough to feel alive.</p>
        </div>
      </section>
    </main>
  </body>
</html>
