<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Local Activity Status</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          linear-gradient(90deg, rgba(0, 47, 167, 0.06) 1px, transparent 1px) 0 0 / 24px 24px,
          #fffdf7;
        color: #222431;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(720px, calc(100vw - 40px));
        display: grid;
        gap: 18px;
      }

      h1 {
        margin: 0;
        color: #002fa7;
        font: 900 clamp(2.1rem, 7vw, 4.8rem) / 0.95 "Snell Roundhand", "Marker Felt", cursive;
      }

      .panel {
        border: 1px solid rgba(0, 47, 167, 0.12);
        border-radius: 18px;
        padding: clamp(1.2rem, 4vw, 2rem);
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 14px 34px rgba(0, 34, 118, 0.08);
      }

      .status {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 20px;
      }

      .app {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .icon {
        width: 48px;
        height: 48px;
        display: grid;
        place-items: center;
        border-radius: 14px;
        background: #002fa7;
        color: white;
        font: 900 1.1rem / 1 ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      h2 {
        margin: 0;
        font: 850 1.2rem / 1.1 ui-sans-serif, system-ui, sans-serif;
      }

      p {
        margin: 0.35rem 0 0;
        color: #777989;
        font: 650 0.92rem / 1.5 ui-sans-serif, system-ui, sans-serif;
      }

      .pill {
        flex: 0 0 auto;
        border-radius: 999px;
        padding: 0.45rem 0.7rem;
        background: rgba(40, 200, 64, 0.12);
        color: #16822a;
        font: 850 0.78rem / 1 ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      .stream {
        display: grid;
        gap: 10px;
      }

      .row {
        display: grid;
        grid-template-columns: 72px 1fr;
        gap: 12px;
        border-top: 1px solid rgba(34, 36, 49, 0.08);
        padding-top: 12px;
        color: #616474;
        font: 700 0.9rem / 1.45 ui-monospace, SFMono-Regular, Menlo, monospace;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Local Activity Status</h1>
      <section class="panel">
        <div class="status">
          <div class="app">
            <div class="icon">OS</div>
            <div>
              <h2>当前前台窗口</h2>
              <p>JustinWeb - Astro dev preview</p>
            </div>
          </div>
          <span class="pill">LIVE</span>
        </div>
        <div class="stream">
          <div class="row"><span>14:21</span><span>Safari active, reading Justin OS.</span></div>
          <div class="row"><span>14:23</span><span>Terminal compiled Astro successfully.</span></div>
          <div class="row"><span>14:25</span><span>Codex received foreground activity update.</span></div>
        </div>
      </section>
    </main>
  </body>
</html>
