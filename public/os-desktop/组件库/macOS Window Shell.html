<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>macOS Window Shell</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 20% 18%, rgba(255, 224, 86, 0.24), transparent 18rem),
          #002fa7;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .window {
        position: relative;
        width: min(760px, calc(100vw - 42px));
        min-height: 430px;
        overflow: hidden;
        border: 1px solid rgba(35, 42, 58, 0.28);
        border-radius: 18px;
        background: #fffdf7;
        box-shadow:
          0 2rem 5rem rgba(0, 17, 70, 0.34),
          inset 0 0 0 1px rgba(255, 255, 255, 0.82);
      }

      .titlebar {
        min-height: 52px;
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        align-items: center;
        gap: 1rem;
        padding: 0 18px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(246, 241, 230, 0.86)),
          #fffdf7;
      }

      .controls {
        display: flex;
        gap: 9px;
      }

      .dot {
        width: 15px;
        height: 15px;
        border-radius: 50%;
        box-shadow: inset 0 -1px 0 rgba(0, 0, 0, 0.14);
      }

      .close {
        background: #ff5f57;
      }

      .minimize {
        background: #ffbd2e;
      }

      .fullscreen {
        background: #28c840;
      }

      h1 {
        margin: 0;
        color: rgba(28, 29, 45, 0.78);
        text-align: center;
        font: 850 0.9rem / 1 ui-sans-serif, system-ui, sans-serif;
      }

      .kind {
        color: rgba(93, 95, 112, 0.6);
        font: 800 0.66rem / 1 ui-monospace, SFMono-Regular, Menlo, monospace;
        text-transform: uppercase;
      }

      .body {
        padding: clamp(1.6rem, 4vw, 2.5rem);
      }

      h2 {
        margin: 0 0 1rem;
        color: #1559bd;
        font: 900 clamp(2.2rem, 7vw, 4.4rem) / 1 "Snell Roundhand", "Marker Felt", cursive;
      }

      p {
        max-width: 560px;
        margin: 0;
        color: #656878;
        font: 650 1rem / 1.8 ui-sans-serif, system-ui, sans-serif;
      }

      .handle {
        position: absolute;
        right: 9px;
        bottom: 9px;
        width: 18px;
        height: 18px;
        border-right: 4px solid rgba(140, 141, 137, 0.55);
        border-bottom: 4px solid rgba(140, 141, 137, 0.55);
        border-radius: 0 0 4px 0;
      }
    </style>
  </head>
  <body>
    <section class="window" aria-label="macOS window shell">
      <div class="titlebar">
        <div class="controls">
          <span class="dot close"></span>
          <span class="dot minimize"></span>
          <span class="dot fullscreen"></span>
        </div>
        <h1>Reusable Window Shell</h1>
        <span class="kind">System</span>
      </div>
      <div class="body">
        <h2>Window Chrome</h2>
        <p>Justin Kit 的 macOS 窗口包含标题栏、三色窗口按钮、内容渲染区、可拖动标题栏和右下角缩放控制。窗口尺寸现在会在手动缩放后持久化。</p>
      </div>
      <span class="handle" aria-hidden="true"></span>
    </section>
  </body>
</html>
