services:
  justinweb:
    build:
      context: .
      args:
        - CANVAS_SALT
        - CANVAS_ENCRYPTED_TOKEN
    container_name: justinweb
    ports:
      - "4321:4321"
    volumes:
      - ./data:/app/data
    environment:
      - HOST=0.0.0.0
      - PORT=4321
    env_file:
      - .env
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4321/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
