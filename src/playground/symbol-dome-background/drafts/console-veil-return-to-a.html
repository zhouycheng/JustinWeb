<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>回到上一版 A</title>
    <style>
      :root {
        --blue: #0735aa;
        --deep: #052d95;
        --yellow: #ffe66a;
        --paper: #f7f3ea;
        --ink: #202635;
        --mx: 0;
        --my: 0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--paper);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .page {
        width: min(1420px, calc(100vw - 42px));
        margin: 0 auto;
        padding: 30px 0 44px;
      }

      .top {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 18px;
        align-items: end;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: clamp(30px, 4.2vw, 58px);
        line-height: 0.98;
        letter-spacing: 0;
      }

      .sub {
        width: min(820px, 100%);
        margin: 12px 0 0;
        color: #626a7a;
        font-size: 15px;
        line-height: 1.72;
      }

      .domain {
        border: 1px solid rgba(7, 53, 170, 0.16);
        border-radius: 999px;
        padding: 11px 16px;
        background: rgba(255, 255, 255, 0.72);
        color: #164fae;
        font: 850 13px / 1 ui-monospace, SFMono-Regular, Menlo, monospace;
        box-shadow: 0 12px 32px rgba(28, 38, 65, 0.08);
      }

      .shell {
        border: 1px solid rgba(26, 37, 64, 0.12);
        border-radius: 8px;
        padding: 13px;
        background: rgba(255, 255, 255, 0.74);
        box-shadow: 0 20px 54px rgba(24, 35, 62, 0.09);
      }

      .desktop {
        position: relative;
        aspect-ratio: 16 / 9;
        overflow: hidden;
        border-radius: 7px;
        background:
          radial-gradient(circle at calc(50% + var(--mx) * 10%) calc(45% + var(--my) * 8%), rgba(255, 230, 106, 0.055), transparent 36%),
          linear-gradient(180deg, var(--blue), var(--deep));
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.12),
          inset 0 -42px 94px rgba(0, 20, 82, 0.1);
      }

      .menu {
        position: absolute;
        z-index: 30;
        inset: 0 0 auto;
        height: 25px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 17px;
        color: rgba(236, 244, 255, 0.7);
        font: 750 10px / 1 ui-monospace, SFMono-Regular, Menlo, monospace;
        text-shadow: 0 1px 8px rgba(0, 26, 91, 0.28);
      }

      .menu strong {
        color: var(--yellow);
        font-family: "Brush Script MT", cursive;
        font-size: 15px;
      }

      .whisper {
        position: absolute;
        z-index: 8;
        inset: 0;
        padding: 42px 54px;
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 17px 24px;
        opacity: 0.68;
        pointer-events: none;
        transform: translate3d(calc(var(--mx) * -9px), calc(var(--my) * 6px), 0);
        transition: transform 0.52s cubic-bezier(0.22, 1, 0.36, 1);
        mask-image: radial-gradient(ellipse at 42% 45%, #000 0%, #000 58%, transparent 100%);
      }

      .whisper span {
        color: rgba(255, 230, 106, var(--o));
        font: 850 var(--s) / 1 ui-monospace, SFMono-Regular, Menlo, monospace;
        text-shadow: 0 0 14px rgba(255, 230, 106, 0.2);
        animation: blink var(--d) steps(1, end) infinite;
      }

      .icons {
        position: absolute;
        z-index: 24;
        top: 41px;
        right: 23px;
        display: grid;
        gap: 19px;
        color: #fff;
        font: 720 9px / 1.2 ui-monospace, SFMono-Regular, Menlo, monospace;
        text-align: center;
        text-shadow: 0 1px 4px rgba(0, 26, 91, 0.28);
      }

      .icon {
        width: 56px;
        display: grid;
        justify-items: center;
        gap: 6px;
      }

      .folder,
      .file {
        width: 35px;
        height: 35px;
        border-radius: 9px;
      }

      .folder {
        background: linear-gradient(180deg, #ffe879, #ffda4f);
        box-shadow: 0 8px 13px rgba(0, 29, 92, 0.22);
      }

      .file {
        display: grid;
        place-items: end center;
        border: 3px solid #b8d9ff;
        background: #fff;
        box-shadow: 0 8px 13px rgba(0, 29, 92, 0.18);
      }

      .file span {
        margin-bottom: 5px;
        border-radius: 4px;
        padding: 2px 4px;
        background: #1b63be;
        color: #fff;
        font-size: 7px;
      }

      .dock {
        position: absolute;
        z-index: 32;
        left: 50%;
        bottom: 14px;
        display: grid;
        grid-template-columns: repeat(3, 93px);
        height: 38px;
        border-radius: 999px;
        padding: 5px;
        background: rgba(248, 249, 255, 0.9);
        box-shadow: 0 16px 42px rgba(0, 20, 86, 0.22);
        transform: translateX(-50%);
      }

      .dock span {
        display: grid;
        place-items: center;
        border-radius: 999px;
        color: rgba(38, 45, 69, 0.45);
        font: 900 11px / 1 ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      .dock span:first-child {
        background: var(--blue);
        color: #fff;
      }

      .note {
        margin: 13px 0 0;
        color: #667083;
        font-size: 14px;
        line-height: 1.6;
      }

      @keyframes blink {
        0%,
        66%,
        100% {
          opacity: 1;
        }
        67%,
        78% {
          opacity: 0.18;
        }
      }

      @media (max-width: 940px) {
        .top {
          grid-template-columns: 1fr;
        }

        .domain {
          justify-self: start;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="top">
        <div>
          <h1>回到上一版 A：低语终端</h1>
          <p class="sub">
            这是你说喜欢的那版 A：轻网格、低透明、淡黄色终端余光。后面那些随机散开和修正稿先全部撤掉。
          </p>
        </div>
        <div class="domain">zhoust.cn / Justin OS</div>
      </div>

      <section class="shell">
        <div class="desktop">
          <div class="whisper" data-glyphs></div>
          <div class="menu"><strong>Justin OS</strong><span>14:34</span></div>
          <div class="icons">
            <div class="icon"><span class="folder"></span><span>组件库</span></div>
            <div class="icon"><span class="folder"></span><span>Design Skill</span></div>
            <div class="icon"><span class="file"><span>.md</span></span><span>人生系统</span></div>
          </div>
          <div class="dock"><span>01 首页</span><span>02 作品集</span><span>03 我的</span></div>
        </div>
        <p class="note">如果继续基于这版改，我只建议做非常小的参数调整：整体再铺宽一点、菜单/Dock 后面是否透出、透明度略升或略降。</p>
      </section>
    </main>

    <script>
      const glyphPool = ["01", "02", "03", "~/", "cd", "ls", "run", "open", "home", "works", "mine", "kit", "zsh", "sys", "now", "log", "view", "OK", "src", "_", ">", "*"];
      let seed = 71;

      function random() {
        seed = (seed * 1664525 + 1013904223) % 4294967296;
        return seed / 4294967296;
      }

      function pick() {
        return glyphPool[Math.floor(random() * glyphPool.length)];
      }

      const layer = document.querySelector("[data-glyphs]");
      for (let index = 0; index < 50; index += 1) {
        const span = document.createElement("span");
        span.textContent = pick();
        span.style.setProperty("--o", (0.1 + random() * 0.28).toFixed(3));
        span.style.setProperty("--s", `${(8 + random() * 6).toFixed(1)}px`);
        span.style.setProperty("--d", `${(3.5 + random() * 3.8).toFixed(2)}s`);
        layer.append(span);
      }

      const root = document.documentElement;
      let tx = 0;
      let ty = 0;
      let mx = 0;
      let my = 0;

      window.addEventListener("pointermove", (event) => {
        tx = (event.clientX / window.innerWidth - 0.5) * 2;
        ty = (event.clientY / window.innerHeight - 0.5) * 2;
      });

      function frame() {
        mx += (tx - mx) * 0.07;
        my += (ty - my) * 0.07;
        root.style.setProperty("--mx", mx.toFixed(3));
        root.style.setProperty("--my", my.toFixed(3));
        requestAnimationFrame(frame);
      }

      requestAnimationFrame(frame);
    </script>
  </body>
</html>
